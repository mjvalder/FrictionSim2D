# Output settings
output:
  dump: 
    system_init: true            # Whether to dump data during system initialization (true or false)
    slide: true                  # Whether to dump simulation data (true or false)
  dump_frequency:
    system_init: 10000           # Dump frequency during system initialization 
    slide: 10000                 # Dump frequency during sliding run
  results_frequency: 1000        # Frequency to save results

# Thermostat and integration settings
thermostat:
  type: 'langevin'    # Type of thermostat used: 'langevin' or 'nose-hoover'
  time_int_type: 'nvt'       # Type of time integration (e.g., 'nvt')
  langevin_boundaries:
    tip:
      fix: [3, 0]
      thermo: [6, 3]
    sub:
      fix: [0, 0.3]
      thermo: [0.3, 0.6]

# Tip and substrate configuration
geometry:
  rigid_tip: false           # Whether the tip is rigid (true/false)
  tip_base_z: 55             # Z-position of the tip base
  substrate_height: 12       # Height of the substrate
  tip_reduction_factor: 2.25 # Factor to reduce tip size
  lat_c_default: 6           # Default interlayer lattice constant if not specified

# Simulation run parameters
simulation:
  thermo: 10000             # Thermostat reporting interval
  timestep: 0.001            # Simulation timestep (in ps)
  neighbor_list: 0.3         # Neighbor list skin distance
  slide_run_steps: 500000   # Number of steps for sliding run
  neigh_modify_command: 'neigh_modify    every 1 delay 0 check yes' # Neighbor list modification command
  min_style: 'cg'            # Minimization style (e.g., 'cg')
  minimization_command: 'minimize 1e-4 1e-8 1000000 1000000' # Minimization command
  drive_method: 'virtual_atom' # Method to drive the tip ('virtual_atom' or 'fix_move' or 'smd')

# Potential settings
potential:
  LJ_type: 'LJ_base'         # Type of Lennard-Jones potential used
  LJ_cutoff: 12.0             # Lennard-Jones potential cutoff distance

# Quenching parameters
quench:
  timestep: 0.001
  quench_slab_dims: [200, 200, 50] # Dimensions of the slab for quenching
  quench_rate: 1e12               # Quench rate in K/s
  quench_target_temp: 300          # Target temperature for quenching
  quench_melt_temp: 2500           # Melting temperature for quenching
  run_local: true               # Whether to run quenching locally (true/false)
  n_procs: 16                     # Number of processors to use if not running locally

# HPC cluster settings
hpc:
  # Job submission settings (for PBS/SLURM script generation)
  scheduler_type: 'pbs'           # 'pbs' or 'slurm'
  queue: null                      # PBS queue name (optional)
  partition: null                 # SLURM partition (optional)
  account: ''                     # Account/project to charge (optional)
  hpc_host: mv923@dtn-c.cx3.hpc.ic.ac.uk
  hpc_home: /rds/general/user/mv923/home/
  scratch_dir: '$EPHEMERAL'           # Scratch directory on compute nodes ($EPHEMERAL or $TMPDIR)
  num_nodes: 1                    # Number of nodes per job
  num_cpus: 32                    # CPUs per node
  memory_gb: 62                   # Memory per node in GB
  walltime_hours: 20              # Walltime per job in hours
  max_array_size: 300             # Maximum simulations per array job
  modules:                        # Environment modules to load on HPC
    - 'tools/prod'
    - 'LAMMPS/29Aug2024-foss-2023b-kokkos'
  mpi_command: 'mpirun'           # MPI launch command
  use_tmpdir: true                # Copy simulation to local temp directory on compute nodes
  lammps_scripts:                 # Default LAMMPS scripts (order matters)
    - 'system.in'
    - 'slide.in'

# AiiDA workflow settings (optional)
aiida:
  enabled: false                  # Enable AiiDA provenance tracking
  lammps_code_label: 'lammps@my_hpc'       # For direct HPC connection
  postprocess_code_label: 'python@my_hpc'  # For direct HPC connection
  postprocess_script_path: '/path/to/your/read_data.py'
  create_provenance: true         # Create provenance nodes during file generation
  auto_import_results: false      # Automatically import results after HPC completion
  hpc_mode: 'offline'             # 'offline', 'local', or 'remote'

  # AiiDA remote computer configuration (optional, for 'aiida setup --use-remote')
  computer_label: 'localhost'     # AiiDA computer label
  transport: 'local'              # 'local' or 'ssh'
  hostname: null                  # Remote hostname (e.g., 'login.hpc.example.edu')
  workdir: null                   # Remote working directory for AiiDA
  username: null                  # SSH username for remote access
  ssh_port: 22                    # SSH port
  key_filename: null              # Path to SSH private key (optional)
