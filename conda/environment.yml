# FrictionSim2D – base conda environment (no AiiDA)
#
# Usage:
#   conda env create -f conda/environment.yml
#   conda activate frictionsim2d
#   export PYTHONPATH=$PWD
#
# This environment provides LAMMPS, Atomsk, and all Python dependencies
# required to generate and run friction simulations locally or on HPC
# (without AiiDA provenance tracking).

name: frictionsim2d

channels:
  - conda-forge
  - defaults

dependencies:
  # ----- Python -----
  - python=3.11

  # ----- Scientific binaries -----
  - lammps
  - atomsk

  # ----- Python packages -----
  - numpy>=1.21
  - ase>=3.22
  - pyyaml>=6.0
  - jinja2>=3.1
  - pydantic>=2.0
  - click>=8.0
  - pandas>=1.5
  - matplotlib>=3.5
  - seaborn>=0.12
  - scipy>=1.8

  # ----- Dev / test -----
  - pip
  - pytest>=7.0
  - pytest-cov>=4.0

  - pip:
      - hatchling
