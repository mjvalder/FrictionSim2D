{% set name = "FrictionSim2D" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}-meta
  version: {{ version }}

source:
  path: ..

build:
  number: 0

outputs:
  # -----------------------------------------------------------------------
  # Base package: conda install frictionsim2d
  # -----------------------------------------------------------------------
  - name: {{ name|lower }}
    build:
      noarch: python
      script: $PYTHON -m pip install . -vv --no-deps --no-build-isolation
      entry_points:
        - FrictionSim2D = src.cli:main
    requirements:
      host:
        - python >=3.9
        - pip
        - hatchling
      run:
        - python >=3.9
        # --- Scientific Binaries ---
        - atomsk
        - lammps
        # --- Python Dependencies ---
        - numpy >=1.21
        - ase >=3.22
        - pyyaml >=6.0
        - jinja2 >=3.1
        - pydantic >=2.0
        - click >=8.0
        - pandas >=1.5
    test:
      imports:
        - src
      commands:
        - FrictionSim2D --help
        - atomsk --version
        - lmp -h

  # -----------------------------------------------------------------------
  # AiiDA variant: conda install frictionsim2d-aiida
  # Installs the base package + aiida-core + rabbitmq + postgresql
  # Includes startup script and optional conda hooks for service automation
  # -----------------------------------------------------------------------
  - name: {{ name|lower }}-aiida
    build:
      noarch: generic
      script: bash conda/post-install-aiida.sh
    requirements:
      run:
        - {{ pin_subpackage(name|lower, exact=True) }}
        - {{ pin_subpackage(name|lower + '-db', exact=True) }}
        - aiida-core >=2.0
        - aiida-core.services >=2.0   # bundles rabbitmq-server + postgresql
        - typing_extensions >=4.0
    test:
      imports:
        - src
        - aiida
      commands:
        - FrictionSim2D --help
        - verdi --version
        - rabbitmqctl help
        - frictionsim2d-start-aiida --help  # confirm startup script is in PATH
        - frictionsim2d-install-hooks --help  # confirm hook installer is in PATH

  # -----------------------------------------------------------------------
  # Database variant: conda install frictionsim2d-db
  # Adds the PostgreSQL driver for FrictionSim2D db commands
  # -----------------------------------------------------------------------
  - name: {{ name|lower }}-db
    build:
      noarch: generic
    requirements:
      run:
        - {{ pin_subpackage(name|lower, exact=True) }}
        - psycopg2 >=2.9
    test:
      imports:
        - src
        - psycopg2

  # -----------------------------------------------------------------------
  # Plotting variant: conda install frictionsim2d-plotting
  # Adds matplotlib, seaborn and scipy for postprocess plot
  # -----------------------------------------------------------------------
  - name: {{ name|lower }}-plotting
    build:
      noarch: generic
    requirements:
      run:
        - {{ pin_subpackage(name|lower, exact=True) }}
        - matplotlib >=3.5
        - seaborn >=0.12
        - scipy >=1.8
    test:
      imports:
        - src
        - matplotlib
        - seaborn
        - scipy

  # -----------------------------------------------------------------------
  # API variant: conda install frictionsim2d-api
  # Adds FastAPI + uvicorn + httpx for the REST API server and client
  # -----------------------------------------------------------------------
  - name: {{ name|lower }}-api
    build:
      noarch: generic
    requirements:
      run:
        - {{ pin_subpackage(name|lower, exact=True) }}
        - fastapi >=0.100
        - uvicorn >=0.20
        - httpx >=0.24
    test:
      imports:
        - src
        - fastapi
        - uvicorn
        - httpx

  # -----------------------------------------------------------------------
  # All-in-one: conda install frictionsim2d-all
  # -----------------------------------------------------------------------
  - name: {{ name|lower }}-all
    build:
      noarch: generic
    requirements:
      run:
        - {{ pin_subpackage(name|lower, exact=True) }}
        - {{ pin_subpackage(name|lower + '-aiida', exact=True) }}
        - {{ pin_subpackage(name|lower + '-db', exact=True) }}
        - {{ pin_subpackage(name|lower + '-plotting', exact=True) }}
        - {{ pin_subpackage(name|lower + '-api', exact=True) }}
    test:
      imports:
        - src

about:
  home: https://github.com/Mclat16/FrictionSim2D
  summary: 'Automated generation of LAMMPS scripts for 2D material friction studies.'
  license: MIT
  license_file: LICENSE