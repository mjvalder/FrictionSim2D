{% set name = "FrictionSim2D" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}-meta
  version: {{ version }}

source:
  path: ..

build:
  number: 0

outputs:
  # -----------------------------------------------------------------------
  # Base package: conda install frictionsim2d
  # -----------------------------------------------------------------------
  - name: {{ name|lower }}
    build:
      script: python -m pip install . -vv --no-deps --no-build-isolation
      entry_points:
        - FrictionSim2D = src.cli:main
    requirements:
      host:
        - python >=3.9
        - pip
        - hatchling
      run:
        - python >=3.9
        # --- Scientific Binaries ---
        - atomsk
        - lammps
        # --- Python Dependencies ---
        - numpy >=1.21
        - ase >=3.22
        - pyyaml >=6.0
        - jinja2 >=3.1
        - pydantic >=2.0
        - click >=8.0
        - pandas >=1.5
    test:
      imports:
        - src
      commands:
        - FrictionSim2D --help
        - atomsk --version
        - lmp -h

  # -----------------------------------------------------------------------
  # AiiDA variant: conda install frictionsim2d-aiida
  # Installs the base package + aiida-core + rabbitmq + postgresql
  # Includes startup script and optional conda hooks for service automation
  # -----------------------------------------------------------------------
  - name: {{ name|lower }}-aiida
    build:
      script: bash -c "mkdir -p $PREFIX/libexec/frictionsim2d/hooks $PREFIX/bin && cp src/aiida/start_aiida.sh $PREFIX/libexec/frictionsim2d/ && chmod +x $PREFIX/libexec/frictionsim2d/start_aiida.sh && ln -sf $PREFIX/libexec/frictionsim2d/start_aiida.sh $PREFIX/bin/frictionsim2d-start-aiida && cp src/aiida/hooks/*.sh $PREFIX/libexec/frictionsim2d/hooks/ && cp src/aiida/install_conda_hooks.sh $PREFIX/libexec/frictionsim2d/hooks/ && chmod +x $PREFIX/libexec/frictionsim2d/hooks/*.sh && ln -sf $PREFIX/libexec/frictionsim2d/hooks/install_conda_hooks.sh $PREFIX/bin/frictionsim2d-install-hooks"
    requirements:
      run:
        - {{ pin_subpackage(name|lower, exact=True) }}
        - aiida-core >=2.0
        - aiida-core.services >=2.0   # bundles rabbitmq-server + postgresql
        - typing_extensions >=4.0
        - psycopg2 >=2.9
    test:
      imports:
        - src
        - aiida
      commands:
        - FrictionSim2D --help
        - verdi --version
        - rabbitmqctl help
        - frictionsim2d-start-aiida --help  # confirm startup script is in PATH
        - frictionsim2d-install-hooks --help  # confirm hook installer is in PATH

about:
  home: https://github.com/Mclat16/FrictionSim2D
  summary: 'Automated generation of LAMMPS scripts for 2D material friction studies.'
  license: MIT
  license_file: LICENSE